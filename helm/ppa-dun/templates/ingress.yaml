apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ppa-dun-ingress
  annotations:
    kubernetes.io/ingress.global-static-ip-name: "ppa-dun-lb"
    networking.gke.io/managed-certificates: "ppa-dun-cert"
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ppa-dun-be
                port:
                  number: 80
          # Webhook receiver from Player API for notifications.
          # FastAPI enforces X-Internal-Key + INTERNAL_WEBHOOK_KEY.
          - path: /internal
            pathType: Prefix
            backend:
              service:
                name: ppa-dun-be
                port:
                  number: 80
          # Manual demo endpoints (POST /admin/notify, POST /admin/refresh-cache).
          # FastAPI enforces X-Admin-Key + ADMIN_SECRET.
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: ppa-dun-be
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ppa-dun-fe
                port:
                  number: 80
